<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Insights | GCE Kannur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#0ea5e9',
                            blueDark: '#0284c7',
                            green: '#10b981',
                            greenDark: '#059669'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #ffffff; color: #111827; font-family: 'Inter', sans-serif; }
        
        .quantum-border { border: 1px solid #e5e7eb; }
        
        .glow:hover { 
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.2);
            transform: translateY(-2px);
            transition: 0.3s ease-in-out;
        }

        /* Post Body Content Styling */
        .post-body { color: #374151; line-height: 1.8; font-size: 1.125rem; }
        .post-body h1, .post-body h2 { 
            color: #111827; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -0.025em; 
            margin-top: 2.5rem; 
            margin-bottom: 1rem;
        }
        .post-body p { margin-bottom: 1.5rem; }
        .post-body img { 
            border-radius: 1.5rem; 
            border: 1px solid #f3f4f6; 
            margin: 3rem 0; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .post-body code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; color: #0ea5e9; font-weight: 600; }

        .hidden { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center p-6 border-b border-gray-100 bg-white/95 sticky top-0 z-50 backdrop-blur-sm">
        <div class="text-xl font-black tracking-widest text-brand-blue uppercase">Quantum Club</div>
        <div class="space-x-8 text-sm font-semibold flex items-center">
            <a href="/" class="text-gray-700 hover:text-brand-blue transition uppercase tracking-tight">Home</a>
            <button id="back-btn" onclick="showList()" class="hidden text-brand-green hover:text-brand-greenDark transition uppercase tracking-widest text-xs font-black">
                ← Back to Archive
            </button>
        </div>
    </nav>

    <main class="py-20 px-8 max-w-5xl mx-auto">
        
        <div id="list-view">
            <header class="mb-16 text-center">
                <h1 class="text-5xl md:text-6xl font-black mb-6 tracking-tighter text-gray-950 uppercase">
                    Quantum <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-green">Insights</span>
                </h1>
                <p class="text-gray-500 font-medium max-w-2xl mx-auto italic">Technical research, project logs, and electronics documentation from the Quantum Lab.</p>
            </header>

            <div id="blog-list" class="grid gap-6">
                <div class="animate-pulse flex flex-col gap-4">
                    <div class="h-32 bg-gray-50 rounded-3xl border border-gray-100"></div>
                    <div class="h-32 bg-gray-50 rounded-3xl border border-gray-100"></div>
                </div>
            </div>
        </div>

        <div id="reader-view" class="hidden">
            <div id="post-header" class="max-w-3xl mx-auto mb-12">
                </div>
            <article id="post-content" class="post-body max-w-3xl mx-auto">
                </article>
        </div>

    </main>

    <footer class="border-t border-gray-100 bg-white mt-20">
        <div class="max-w-6xl mx-auto px-8 py-10 text-center">
            <div class="text-gray-500 text-sm font-semibold tracking-tight uppercase">
                &copy; 2026 <span class="text-gray-900 font-black">QUANTUM CLUB GCEK</span>
            </div>
        </div>
    </footer>

    <script>
        const GITHUB_USER = 'quantumclubgcek'; 
        const REPO_NAME = 'quantumclubgceksite';
        
        const blogList = document.getElementById('blog-list');
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const postContent = document.getElementById('post-content');
        const postHeader = document.getElementById('post-header');
        const backBtn = document.getElementById('back-btn');

        function showList() {
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readPost(downloadUrl) {
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            postContent.innerHTML = "<p class='text-center py-20 font-bold text-gray-400 animate-pulse uppercase tracking-widest text-xs'>Initializing Data Stream...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();

                const parts = rawText.split('---');
                let finalMarkdown = rawText;
                let metadata = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    finalMarkdown = parts.slice(2).join('---');
                    yaml.split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) metadata[key.trim()] = val.join(':').trim();
                    });
                }

                // Normalizing Image Paths
                let thumbSrc = metadata.thumbnail;
                if (thumbSrc && !thumbSrc.startsWith('http') && !thumbSrc.startsWith('/')) {
                    thumbSrc = '/' + thumbSrc;
                }

                const dateStr = metadata.date ? new Date(metadata.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Technical Brief';

                postHeader.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <span class="text-xs font-black text-brand-blue uppercase tracking-widest">${dateStr}</span>
                        <div class="h-1 w-1 bg-gray-300 rounded-full"></div>
                        <span class="text-xs font-black text-brand-green uppercase tracking-widest">${metadata.author || 'Member'}</span>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black text-gray-950 uppercase leading-tight tracking-tighter mb-10">${metadata.title || 'Untitled Log'}</h1>
                    ${thumbSrc ? `<img src="${thumbSrc}" class="w-full h-auto rounded-3xl border border-gray-100 shadow-sm mb-12">` : ''}
                `;

                postContent.innerHTML = marked.parse(finalMarkdown);
                window.scrollTo(0,0);
            } catch (err) {
                postContent.innerHTML = "<p class='text-red-500 font-bold uppercase text-center'>Error 404: Node Unreachable</p>";
            }
        }

        async function fetchBlogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/blog`);
                const files = await response.json();
                const posts = files.filter(file => file.name.endsWith('.md')).reverse();

                if (posts.length === 0) {
                    blogList.innerHTML = "<p class='text-gray-400 text-center py-10 uppercase font-bold text-xs tracking-widest'>No data recorded.</p>";
                    return;
                }

                blogList.innerHTML = ''; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "group p-8 bg-white border border-gray-200 rounded-3xl glow transition-all cursor-pointer flex flex-col md:flex-row justify-between items-start md:items-center gap-4";
                    
                    const titleClean = post.name.replace('.md', '').split('-').filter(p => isNaN(p)).join(' ') || post.name.replace('.md', '');

                    card.innerHTML = `
                        <div>
                            <span class="text-[10px] font-black text-brand-blue uppercase tracking-[0.2em] mb-2 block">Accessing Log...</span>
                            <h2 class="text-2xl font-black text-gray-900 group-hover:text-brand-blue transition uppercase leading-tight tracking-tight">${titleClean}</h2>
                        </div>
                        <span class="text-xs font-black text-brand-green tracking-widest uppercase flex items-center gap-2">
                            Read Log 
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                            </svg>
                        </span>
                    `;
                    
                    card.onclick = () => readPost(post.download_url);
                    blogList.appendChild(card);
                });

            } catch (error) {
                blogList.innerHTML = "<p class='text-red-500 font-bold text-center uppercase text-xs tracking-widest'>Failed to establish handshake.</p>";
            }
        }

        fetchBlogs();
    </script>
</body>
</html>
