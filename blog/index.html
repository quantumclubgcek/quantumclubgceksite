<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Insights | GCEK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #020617; /* Deep Navy */
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Card Styles */
        .blog-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blog-card:hover {
            border-color: #10b981; /* Emerald Green */
            transform: translateY(-3px);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.3); /* Blue Glow */
        }

        /* Reader View Styles */
        .post-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            line-height: 1.1; 
            margin-bottom: 1rem; 
            background: linear-gradient(90deg, #3b82f6, #10b981); /* Blue to Green */
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .post-meta { 
            color: #94a3b8; 
            font-size: 0.95rem; 
            margin-bottom: 2.5rem; 
            border-bottom: 1px solid #1e293b; 
            padding-bottom: 1.5rem; 
            display: flex;
            gap: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .post-body { 
            color: #cbd5e1; 
            line-height: 1.8; 
            font-size: 1.15rem; 
        }
        .post-body h1, .post-body h2, .post-body h3 { 
            color: #ffffff; 
            margin-top: 2.5rem; 
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .post-body p { margin-bottom: 1.5rem; }
        .post-body code { background: #1e293b; padding: 2px 6px; border-radius: 4px; color: #10b981; }
        
        .hidden { display: none; }
        .glass-nav { backdrop-filter: blur(16px); background: rgba(2, 6, 23, 0.8); border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="/" class="font-black tracking-tighter text-xl text-white">QUANTUM CLUB<span class="text-emerald-500">.</span></a>
            <button id="back-btn" onclick="showList()" class="hidden text-sm text-blue-400 font-bold hover:text-emerald-400 transition">
                ← BACK TO ARCHIVE
            </button>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            
            <div id="list-view">
                <header class="mb-16">
                    <h1 class="text-6xl font-black mb-4">Quantum <span class="text-emerald-500">Insights</span></h1>
                    <p class="text-slate-400 text-lg">Exploring the intersection of electronics, firmware, and quantum logic.</p>
                </header>

                <div id="blog-list" class="grid gap-6">
                    <div class="animate-pulse flex flex-col gap-4">
                        <div class="h-24 bg-slate-900 rounded-2xl"></div>
                        <div class="h-24 bg-slate-900 rounded-2xl"></div>
                    </div>
                </div>
            </div>

            <div id="reader-view" class="hidden">
                <article id="post-content" class="post-body">
                    </article>
            </div>

        </div>
    </main>

    <script>
        // CONFIGURATION
        const GITHUB_ORG = 'quantum-club-repo'; 
        const REPO_NAME = 'quantum-club-site';
        
        const blogList = document.getElementById('blog-list');
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const postContent = document.getElementById('post-content');
        const backBtn = document.getElementById('back-btn');

        function showList() {
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readPost(downloadUrl) {
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            postContent.innerHTML = "<p class='text-blue-400 animate-pulse text-center py-20 font-bold tracking-widest'>FETCHING DATA STREAM...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();

                // Frontmatter Extraction
                const parts = rawText.split('---');
                let finalMarkdown = rawText;
                let metadata = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    finalMarkdown = parts.slice(2).join('---');
                    yaml.split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) metadata[key.trim()] = val.join(':').trim();
                    });
                }

                const dateDisplay = metadata.date ? new Date(metadata.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Technical Brief';

                postContent.innerHTML = `
                    <h1 class="post-title capitalize">${metadata.title || 'Untitled Archive'}</h1>
                    <div class="post-meta">
                        <span class="text-blue-400">${metadata.author || 'RESEARCHER'}</span>
                        <span class="text-slate-700">//</span>
                        <span class="text-emerald-500">${dateDisplay}</span>
                    </div>
                    ${metadata.thumbnail ? `<img src="${metadata.thumbnail}" class="w-full h-auto max-h-[450px] object-cover rounded-3xl mb-12 border border-slate-800 shadow-2xl">` : ''}
                    <div class="prose-container">
                        ${marked.parse(finalMarkdown)}
                    </div>
                `;
                window.scrollTo(0,0);
            } catch (err) {
                postContent.innerHTML = "<p class='text-red-500'>CRITICAL ERROR: Failed to decode post.</p>";
            }
        }

        async function fetchBlogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${REPO_NAME}/contents/blog`);
                const files = await response.json();
                const posts = files.filter(file => file.name.endsWith('.md'));

                if (posts.length === 0) {
                    blogList.innerHTML = "<p class='text-slate-500 text-center py-10'>No insights recorded in the database yet.</p>";
                    return;
                }

                blogList.innerHTML = ''; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "blog-card p-8 rounded-2xl cursor-pointer group";
                    
                    const displayTitle = post.name.replace('.md', '').split('-').slice(3).join(' ') || post.name.replace('.md', '');

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold capitalize text-white group-hover:text-blue-400 transition">${displayTitle}</h2>
                                <p class="text-emerald-500 text-xs font-black mt-2 tracking-widest">ACCESS LOGS →</p>
                            </div>
                        </div>
                    `;
                    
                    card.onclick = () => readPost(post.download_url);
                    blogList.appendChild(card);
                });

            } catch (error) {
                blogList.innerHTML = "<p class='text-red-500 text-center py-10'>NETWORK ERROR: GitHub connection timed out.</p>";
            }
        }

        fetchBlogs();
    </script>
</body>
</html>
