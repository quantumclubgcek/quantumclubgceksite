<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Insights | GCE Kannur</title>
    <link rel="icon" href="https://img.icons8.com/fluency-systems-filled/48/0ea5e9/circuit.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#0ea5e9',
                            blueDark: '#0284c7',
                            green: '#10b981',
                            greenDark: '#059669'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #ffffff; color: #111827; font-family: 'Inter', sans-serif; }
        .glow:hover { 
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.2);
            transform: translateY(-2px);
            transition: 0.3s ease-in-out;
        }
        .post-body { color: #374151; line-height: 1.8; font-size: 1.125rem; }
        .post-body h1, .post-body h2 { color: #111827; font-weight: 900; text-transform: uppercase; margin-top: 2.5rem; margin-bottom: 1rem; }
        .post-body p { margin-bottom: 1.5rem; }
        .post-body img { border-radius: 1.5rem; border: 1px solid #f3f4f6; margin: 3rem 0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .post-body code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; color: #0ea5e9; font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center p-6 border-b border-gray-100 bg-white/95 sticky top-0 z-50 backdrop-blur-sm">
        <div class="text-xl font-black tracking-widest text-brand-blue uppercase"><a href="/">Quantum Club</a></div>
        <div class="space-x-8 text-sm font-semibold hidden md:flex items-center">
            <button id="back-btn" onclick="showList()" class="hidden text-brand-green hover:text-brand-greenDark transition uppercase tracking-widest text-xs font-black mr-4">← Back to Archive</button>
            <a href="/" class="text-gray-700 hover:text-brand-blue transition uppercase tracking-tight">Home</a>
            <a href="/events" class="text-gray-700 hover:text-brand-blue transition uppercase tracking-tight">Events</a>
            <a href="/blog" class="text-brand-blue transition uppercase tracking-tight border-b-2 border-brand-blue">Blog</a>
            <a href="/admin/" class="bg-gradient-to-r from-brand-blue to-brand-blueDark text-white px-5 py-2.5 rounded-full text-xs font-bold uppercase tracking-widest glow transition-all">Admin Portal</a>
        </div>
    </nav>

    <main class="py-20 px-8 max-w-5xl mx-auto">
        <div id="list-view">
            <header class="mb-16 text-center">
                <span class="text-xs font-black text-brand-blue uppercase tracking-[0.3em] mb-4 block">Research Archives</span>
                <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter text-gray-950 uppercase">Quantum <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-green">Insights.</span></h1>
            </header>
            <div id="blog-list" class="grid gap-6"></div>
        </div>

        <div id="reader-view" class="hidden">
            <div id="post-header" class="max-w-3xl mx-auto mb-12"></div>
            <article id="post-content" class="post-body max-w-3xl mx-auto"></article>
        </div>
    </main>

    <script>
        const GITHUB_USER = 'quantumclubgcek'; 
        const REPO_NAME = 'quantumclubgceksite';
        const blogList = document.getElementById('blog-list');
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const postContent = document.getElementById('post-content');
        const postHeader = document.getElementById('post-header');
        const backBtn = document.getElementById('back-btn');

        function showList() {
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readPost(downloadUrl) {
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            postContent.innerHTML = "<p class='text-center py-20 animate-pulse uppercase tracking-widest text-xs font-bold text-gray-400'>Syncing Node...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();
                const parts = rawText.split('---');
                let finalMarkdown = rawText, metadata = {};

                if (parts.length >= 3) {
                    finalMarkdown = parts.slice(2).join('---');
                    parts[1].split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) metadata[key.trim()] = val.join(':').trim();
                    });
                }

                const dateStr = metadata.date ? new Date(metadata.date).toLocaleDateString() : 'Technical Entry';
                postHeader.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <span class="text-xs font-black text-brand-blue uppercase tracking-widest">${dateStr}</span>
                        <div class="h-1 w-1 bg-gray-300 rounded-full"></div>
                        <span class="text-xs font-black text-brand-green uppercase tracking-widest">${metadata.author || 'Quantum Lab'}</span>
                    </div>
                    <h1 class="text-4xl md:text-6xl font-black text-gray-950 uppercase leading-tight tracking-tighter mb-10">${metadata.title || 'Untitled Log'}</h1>
                `;
                postContent.innerHTML = marked.parse(finalMarkdown);
            } catch (err) { postContent.innerHTML = "Error loading content."; }
        }

        async function fetchBlogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/blog`);
                const files = await response.json();
                const posts = files.filter(file => file.name.endsWith('.md')).reverse();
                blogList.innerHTML = ''; 
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "group p-8 bg-white border border-gray-200 rounded-3xl glow transition-all cursor-pointer flex flex-col md:flex-row justify-between items-center gap-4";
                    const titleClean = post.name.replace('.md', '').split('-').filter(p => isNaN(p)).join(' ');
                    card.innerHTML = `<div><span class="text-[10px] font-black text-brand-blue uppercase tracking-widest mb-1 block">Log Entry</span><h2 class="text-2xl font-black text-gray-900 group-hover:text-brand-blue transition uppercase tracking-tight">${titleClean}</h2></div><span class="text-xs font-black text-brand-green tracking-widest uppercase">Read Insight →</span>`;
                    card.onclick = () => readPost(post.download_url);
                    blogList.appendChild(card);
                });
            } catch (e) { blogList.innerHTML = "Offline."; }
        }
        fetchBlogs();
    </script>
</body>
</html>
