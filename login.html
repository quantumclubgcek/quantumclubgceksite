<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Quantum Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-gray-800 shadow-2xl rounded-xl p-8 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-500">Quantum Club</h1>
            <p class="text-gray-400 mt-2">Admin Portal Access</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95">
                Sign In
            </button>
        </form>

        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
