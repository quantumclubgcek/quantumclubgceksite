<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Quantum Club GCEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #020617; /* Deep Navy */
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
        }

        /* Event Card Styles */
        .event-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            transition: all 0.4s ease;
        }
        .event-card:hover {
            border-color: #10b981; /* Green accent */
            transform: translateY(-5px);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 20px 40px -20px rgba(59, 130, 246, 0.4); /* Blue glow */
        }

        /* Reader Styles */
        .event-header-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            line-height: 1; 
            margin-bottom: 1.5rem; 
            background: linear-gradient(90deg, #3b82f6, #10b981); /* Blue to Green */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .event-badge {
            padding: 4px 12px;
            background: #10b981; /* Green */
            color: #020617;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .text-accent { color: #3b82f6; } /* Blue Accent */
        .hidden { display: none; }
        .glass-nav { backdrop-filter: blur(16px); background: rgba(2, 6, 23, 0.8); border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="font-black tracking-tighter text-xl text-white">QUANTUM CLUB<span class="text-emerald-500">.</span></a>
            <button id="back-btn" onclick="showGrid()" class="hidden text-sm font-bold text-blue-400 hover:text-emerald-400 transition">
                ← BACK TO EVENTS
            </button>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div id="grid-view">
                <header class="max-w-2xl mb-16">
                    <h1 class="text-5xl font-black mb-6 text-white">Upcoming <span class="text-emerald-500">&</span> Past Events</h1>
                    <p class="text-slate-400 text-lg">Join our workshops and technical symposiums at GCE Kannur.</p>
                </header>
                <div id="event-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="col-span-full py-20 text-center text-slate-500 animate-pulse italic">Synchronizing...</div>
                </div>
            </div>

            <div id="reader-view" class="hidden max-w-3xl mx-auto">
                <article id="event-body" class="text-slate-200 leading-relaxed text-lg">
                    </article>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_ORG = 'quantum-club-repo'; 
        const REPO_NAME = 'quantum-club-site';
        
        const eventGrid = document.getElementById('event-grid');
        const gridView = document.getElementById('grid-view');
        const readerView = document.getElementById('reader-view');
        const eventBody = document.getElementById('event-body');
        const backBtn = document.getElementById('back-btn');

        function showGrid() {
            gridView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readEvent(downloadUrl) {
            gridView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            eventBody.innerHTML = "<p class='text-blue-400 text-center py-20'>Loading Event...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();
                const parts = rawText.split('---');
                let finalMarkdown = rawText;
                let meta = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    finalMarkdown = parts.slice(2).join('---');
                    yaml.split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) meta[key.trim()] = val.join(':').trim();
                    });
                }

                eventBody.innerHTML = `
                    <div class="mb-4"><span class="event-badge">Technical Event</span></div>
                    <h1 class="event-header-title">${meta.title || 'Event'}</h1>
                    <p class="text-blue-400 font-bold mb-8 uppercase tracking-widest text-sm">${meta.date ? new Date(meta.date).toDateString() : ''}</p>
                    ${meta.thumbnail ? `<img src="${meta.thumbnail}" class="w-full rounded-2xl mb-10 border border-slate-800 shadow-2xl">` : ''}
                    <div class="prose prose-invert max-w-none">
                        ${marked.parse(finalMarkdown)}
                    </div>
                `;
            } catch (err) { eventBody.innerHTML = "Error loading content."; }
        }

        async function fetchEvents() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${REPO_NAME}/contents/events`);
                const files = await response.json();
                const eventFiles = files.filter(file => file.name.endsWith('.md'));
                eventGrid.innerHTML = ''; 

                eventFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = "event-card p-8 rounded-2xl cursor-pointer";
                    const cleanTitle = file.name.replace('.md', '').split('-').slice(3).join(' ') || file.name.replace('.md', '');

                    card.innerHTML = `
                        <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center mb-6">
                            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"></path></svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-4 capitalize">${cleanTitle}</h3>
                        <span class="text-xs font-black text-blue-400 tracking-widest">DETAILS →</span>
                    `;
                    card.onclick = () => readEvent(file.download_url);
                    eventGrid.appendChild(card);
                });
            } catch (error) { eventGrid.innerHTML = "Failed to load."; }
        }
        fetchEvents();
    </script>
</body>
</html>
