<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Quantum Club GCEK</title>
    <link rel="icon" href="https://img.icons8.com/fluency-systems-filled/48/0ea5e9/circuit.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#0ea5e9',
                            blueDark: '#0284c7',
                            green: '#10b981',
                            greenDark: '#059669'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #ffffff; color: #111827; font-family: 'Inter', sans-serif; }
        .glow:hover { 
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
            transition: 0.3s ease-in-out;
        }
        .event-body { color: #374151; line-height: 1.8; font-size: 1.125rem; }
        .event-body h1 { color: #111827; font-weight: 900; text-transform: uppercase; }
        .hidden { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center p-6 border-b border-gray-100 bg-white/95 sticky top-0 z-50 backdrop-blur-sm">
        <div class="text-xl font-black tracking-widest text-brand-blue uppercase"><a href="/">Quantum Club</a></div>
        <div class="space-x-8 text-sm font-semibold hidden md:flex items-center">
            <button id="back-btn" onclick="showGrid()" class="hidden text-brand-green hover:text-brand-greenDark transition uppercase tracking-widest text-xs font-black mr-4">← Back to Grid</button>
            <a href="/" class="text-gray-700 hover:text-brand-blue transition uppercase tracking-tight">Home</a>
            <a href="/events" class="text-brand-blue transition uppercase tracking-tight border-b-2 border-brand-blue">Events</a>
            <a href="/blog" class="text-gray-700 hover:text-brand-blue transition uppercase tracking-tight">Blog</a>
            <a href="/admin/" class="bg-gradient-to-r from-brand-blue to-brand-blueDark text-white px-5 py-2.5 rounded-full text-xs font-bold uppercase tracking-widest glow transition-all">Admin Portal</a>
        </div>
    </nav>

    <main class="py-20 px-8 max-w-6xl mx-auto">
        <div id="grid-view">
            <header class="mb-16">
                <h1 class="text-5xl md:text-6xl font-black mb-6 tracking-tighter text-gray-950 uppercase">Our <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-green">Events</span></h1>
                <p class="text-gray-500 font-medium italic border-l-4 border-brand-green pl-4">Technical symposiums and workshops at GCE Kannur.</p>
            </header>
            <div id="event-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="reader-view" class="hidden">
            <div id="event-header" class="max-w-3xl mx-auto mb-12"></div>
            <article id="event-content" class="event-body max-w-3xl mx-auto"></article>
        </div>
    </main>

    <script>
        const GITHUB_USER = 'quantumclubgcek'; 
        const REPO_NAME = 'quantumclubgceksite';
        const eventGrid = document.getElementById('event-grid');
        const gridView = document.getElementById('grid-view');
        const readerView = document.getElementById('reader-view');
        const eventContent = document.getElementById('event-content');
        const eventHeader = document.getElementById('event-header');
        const backBtn = document.getElementById('back-btn');

        function showGrid() {
            gridView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readEvent(downloadUrl) {
    gridView.classList.add('hidden');
    readerView.classList.remove('hidden');
    backBtn.classList.remove('hidden');
    eventContent.innerHTML = "Loading...";

    try {
        const response = await fetch(downloadUrl);
        const rawText = await response.text();
        const parts = rawText.split('---');
        let finalMarkdown = rawText, metadata = {};

        if (parts.length >= 3) {
            finalMarkdown = parts.slice(2).join('---');
            parts[1].split('\n').forEach(line => {
                const [key, ...val] = line.split(':');
                if (key) metadata[key.trim()] = val.join(':').trim();
            });
        }

        // Logic to handle the image path
        let imageHtml = '';
        if (metadata.image) {
            // Ensure the path is correct (GitHub raw images need the full path if not hosted locally)
            const imageUrl = metadata.image.startsWith('http') 
                ? metadata.image 
                : `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main${metadata.image}`;
            
            imageHtml = `<img src="${imageUrl}" class="w-full h-auto rounded-3xl mb-10 shadow-lg border border-gray-100" alt="${metadata.title}">`;
        }

        eventHeader.innerHTML = `
            <div class="flex items-center gap-4 mb-6">
                <span class="bg-brand-green/10 text-brand-green px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">Live Session</span>
            </div>
            ${imageHtml} 
            <h1 class="text-4xl md:text-6xl font-black text-gray-950 uppercase leading-tight mb-10">${metadata.title || 'Event'}</h1>
        `;
        
        eventContent.innerHTML = marked.parse(finalMarkdown);
    } catch (e) { 
        console.error(e);
        eventContent.innerHTML = "Error loading event details."; 
    }
}

        async function fetchEvents() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/events`);
                const files = await response.json();
                const events = files.filter(f => f.name.endsWith('.md')).reverse();
                eventGrid.innerHTML = '';
                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = "group p-8 bg-white border border-gray-200 rounded-3xl glow transition-all cursor-pointer flex flex-col justify-between min-h-[250px]";
                    const titleClean = event.name.replace('.md', '').split('-').filter(p => isNaN(p)).join(' ');
                    card.innerHTML = `<div><div class="w-12 h-12 bg-brand-blue/10 rounded-2xl flex items-center justify-center mb-6"><svg class="w-6 h-6 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2.5"></path></svg></div><h2 class="text-2xl font-black text-gray-900 group-hover:text-brand-blue transition uppercase tracking-tight leading-tight">${titleClean}</h2></div><span class="text-xs font-black text-brand-blue tracking-widest uppercase mt-8">View Details →</span>`;
                    card.onclick = () => readEvent(event.download_url);
                    eventGrid.appendChild(card);
                });
            } catch (e) { eventGrid.innerHTML = "Offline."; }
        }
        fetchEvents();
    </script>
</body>
</html>
