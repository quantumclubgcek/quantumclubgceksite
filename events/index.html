<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Quantum Club GCE Kannur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#0ea5e9',
                            blueDark: '#0284c7',
                            green: '#10b981',
                            greenDark: '#059669'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #ffffff; color: #111827; font-family: 'Inter', sans-serif; }
        
        .quantum-border { border: 1px solid #e5e7eb; }
        
        .glow:hover { 
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
            transition: 0.3s ease-in-out;
        }

        /* Post Body Content Styling */
        .event-body { color: #374151; line-height: 1.8; font-size: 1.125rem; }
        .event-body h1, .event-body h2 { 
            color: #111827; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -0.025em; 
            margin-top: 2.5rem; 
            margin-bottom: 1rem;
        }
        .event-body img { 
            border-radius: 1.5rem; 
            border: 1px solid #f3f4f6; 
            margin: 3rem 0; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .hidden { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center p-6 border-b border-gray-100 bg-white/95 sticky top-0 z-50 backdrop-blur-sm">
        <div class="text-xl font-black tracking-widest text-brand-blue uppercase">Quantum Club</div>
        <div class="space-x-8 text-sm font-semibold flex items-center">
            <a href="/" class="text-gray-700 hover:text-brand-blue transition uppercase tracking-tight">Home</a>
            <button id="back-btn" onclick="showGrid()" class="hidden text-brand-blue hover:text-brand-blueDark transition uppercase tracking-widest text-xs font-black">
                ← Back to List
            </button>
        </div>
    </nav>

    <main class="py-20 px-8 max-w-6xl mx-auto">
        
        <div id="grid-view">
            <header class="mb-16">
                <h1 class="text-5xl md:text-6xl font-black mb-6 tracking-tighter text-gray-950 uppercase">
                    Our <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-green">Events</span>
                </h1>
                <p class="text-gray-500 font-medium max-w-2xl italic border-l-4 border-brand-green pl-4">Workshops, Hackathons, and Symposiums at Government College of Engineering, Kannur.</p>
            </header>

            <div id="event-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="animate-pulse bg-gray-50 h-64 rounded-3xl border border-gray-100"></div>
                <div class="animate-pulse bg-gray-50 h-64 rounded-3xl border border-gray-100"></div>
                <div class="animate-pulse bg-gray-50 h-64 rounded-3xl border border-gray-100"></div>
            </div>
        </div>

        <div id="reader-view" class="hidden">
            <div id="event-header" class="max-w-3xl mx-auto mb-12">
                </div>
            <article id="event-content" class="event-body max-w-3xl mx-auto">
                </article>
        </div>

    </main>

    <footer class="border-t border-gray-100 bg-white mt-20">
        <div class="max-w-6xl mx-auto px-8 py-10 text-center">
            <div class="text-gray-500 text-sm font-semibold tracking-tight uppercase">
                &copy; 2026 <span class="text-gray-900 font-black">QUANTUM CLUB GCEK</span>
            </div>
        </div>
    </footer>

    <script>
        // Updated to your specific repo
        const GITHUB_USER = 'quantumclubgcek'; 
        const REPO_NAME = 'quantumclubgceksite';
        
        const eventGrid = document.getElementById('event-grid');
        const gridView = document.getElementById('grid-view');
        const readerView = document.getElementById('reader-view');
        const eventContent = document.getElementById('event-content');
        const eventHeader = document.getElementById('event-header');
        const backBtn = document.getElementById('back-btn');

        function showGrid() {
            gridView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readEvent(downloadUrl) {
            gridView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            eventContent.innerHTML = "<p class='text-center py-20 font-bold text-gray-400 animate-pulse uppercase tracking-widest text-xs'>Initializing Data Stream...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();

                const parts = rawText.split('---');
                let finalMarkdown = rawText;
                let metadata = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    finalMarkdown = parts.slice(2).join('---');
                    yaml.split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) metadata[key.trim()] = val.join(':').trim();
                    });
                }

                // Normalizing Image Paths
                let thumbSrc = metadata.thumbnail;
                if (thumbSrc && !thumbSrc.startsWith('http') && !thumbSrc.startsWith('/')) {
                    thumbSrc = '/' + thumbSrc;
                }

                const dateStr = metadata.date ? new Date(metadata.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Event Documentation';

                eventHeader.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <span class="bg-brand-green/10 text-brand-green px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase border border-brand-green/20">LIVE EVENT</span>
                        <div class="h-1 w-1 bg-gray-300 rounded-full"></div>
                        <span class="text-xs font-black text-brand-blue uppercase tracking-widest">${dateStr}</span>
                    </div>
                    <h1 class="text-4xl md:text-6xl font-black text-gray-950 uppercase leading-tight tracking-tighter mb-10">${metadata.title || 'Untitled Event'}</h1>
                    ${thumbSrc ? `<img src="${thumbSrc}" class="w-full h-auto rounded-3xl border border-gray-100 shadow-sm mb-12">` : ''}
                `;

                eventContent.innerHTML = marked.parse(finalMarkdown);
                window.scrollTo(0,0);
            } catch (err) {
                eventContent.innerHTML = "<p class='text-red-500 font-bold uppercase text-center'>Error 404: Event Node Unreachable</p>";
            }
        }

        async function fetchEvents() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/events`);
                const files = await response.json();
                const posts = files.filter(file => file.name.endsWith('.md')).reverse();

                if (posts.length === 0) {
                    eventGrid.innerHTML = "<p class='text-gray-400 text-center py-10 col-span-full uppercase font-bold text-xs tracking-widest'>No events currently scheduled.</p>";
                    return;
                }

                eventGrid.innerHTML = ''; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "group p-8 bg-white border border-gray-200 rounded-3xl glow transition-all cursor-pointer flex flex-col justify-between min-h-[260px]";
                    
                    const titleClean = post.name.replace('.md', '').split('-').filter(p => isNaN(p)).join(' ') || post.name.replace('.md', '');

                    card.innerHTML = `
                        <div>
                            <div class="w-12 h-12 bg-brand-blue/10 rounded-2xl flex items-center justify-center mb-6 border border-brand-blue/5 group-hover:bg-brand-green/10 group-hover:border-brand-green/10 transition-colors">
                                <svg class="w-6 h-6 text-brand-blue group-hover:text-brand-green transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2.5"></path></svg>
                            </div>
                            <h2 class="text-2xl font-black text-gray-900 group-hover:text-brand-blue transition uppercase leading-tight tracking-tight">${titleClean}</h2>
                        </div>
                        <div class="flex items-center justify-between mt-8">
                            <span class="text-[10px] font-black text-gray-400 tracking-widest uppercase">Registration Details</span>
                            <span class="text-xs font-black text-brand-blue tracking-widest uppercase flex items-center gap-2 group-hover:text-brand-green transition">
                                VIEW →
                            </span>
                        </div>
                    `;
                    
                    card.onclick = () => readEvent(post.download_url);
                    eventGrid.appendChild(card);
                });

            } catch (error) {
                eventGrid.innerHTML = "<p class='text-red-500 font-bold text-center col-span-full uppercase text-xs tracking-widest'>Handshake Failed.</p>";
            }
        }

        fetchEvents();
    </script>
</body>
</html>
